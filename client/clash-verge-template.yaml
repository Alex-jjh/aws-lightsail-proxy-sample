# ============================================================
# Clash Verge Rev (mihomo) Configuration Template
# Clash Verge Rev 配置模板
# ============================================================
# 使用方法 / Usage:
#   1. 替换占位符 / Replace placeholders:
#        {{SERVER_IP}}, {{UUID}}, {{PUBLIC_KEY}},
#        {{SHORT_ID}}, {{SS_PASSWORD}}
#   2. 保存为 .yaml 文件，在 Clash Verge Rev 中导入
#   3. Save as .yaml and import into Clash Verge Rev
#
# 凭证来源 / Source of credentials:
#   sudo cat /opt/proxy-credentials.json | jq .
# ============================================================

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback:
    - https://dns.google/dns-query

proxies:
  # ----------------------------------------------------------
  # VLESS Reality - Primary (port 443)
  # ----------------------------------------------------------
  - name: "Lightsail-VLESS-Reality"
    type: vless
    server: "{{SERVER_IP}}"
    port: 443
    uuid: "{{UUID}}"
    network: tcp
    udp: true
    tls: true
    reality-opts:
      public-key: "{{PUBLIC_KEY}}"
      short-id: "{{SHORT_ID}}"
    client-fingerprint: chrome
    servername: www.microsoft.com

  # ----------------------------------------------------------
  # Shadowsocks - Backup (port 8388)
  # ----------------------------------------------------------
  - name: "Lightsail-SS-Backup"
    type: ss
    server: "{{SERVER_IP}}"
    port: 8388
    cipher: 2022-blake3-aes-256-gcm
    password: "{{SS_PASSWORD}}"
    udp: true

proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - Auto
      - Lightsail-VLESS-Reality
      - Lightsail-SS-Backup
      - DIRECT

  - name: "Auto"
    type: url-test
    proxies:
      - Lightsail-VLESS-Reality
      - Lightsail-SS-Backup
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

rules:
  # Local / private
  - DOMAIN-SUFFIX,localhost,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT

  # China traffic goes direct
  - GEOIP,CN,DIRECT

  # Everything else through proxy
  - MATCH,Proxy
